<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a1628"/>
  
  <!-- Outer Circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="8"/>
  
  <!-- Compass Rose Lines -->
  <g stroke="#1a2332" stroke-width="4">
    <line x1="256" y1="56" x2="256" y2="456"/>
    <line x1="56" y1="256" x2="456" y2="256"/>
    <line x1="114.7" y1="114.7" x2="397.3" y2="397.3"/>
    <line x1="397.3" y1="114.7" x2="114.7" y2="397.3"/>
  </g>
  
  <!-- Aircraft Symbol -->
  <g transform="translate(256, 256)">
    <!-- Fuselage -->
    <path d="M0 -120 L0 120" stroke="#00d4ff" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Nose -->
    <path d="M0 -120 L-10 -90 L10 -90 Z" fill="#00d4ff"/>
    
    <!-- Main Wings -->
    <path d="M-140 -20 L0 10 L140 -20 L140 -5 L0 25 L-140 -5 Z" fill="#00d4ff"/>
    
    <!-- Horizontal Stabilizer -->
    <path d="M-60 90 L0 100 L60 90 L60 100 L0 115 L-60 100 Z" fill="#00d4ff"/>
    
    <!-- Vertical Stabilizer -->
    <path d="M0 80 L0 40 L25 80 Z" fill="#00d4ff"/>
    
    <!-- Center Point -->
    <circle cx="0" cy="0" r="15" fill="#ff6b00"/>
    <circle cx="0" cy="0" r="8" fill="#0a1628"/>
  </g>
  
  <!-- Cardinal Directions -->
  <text x="256" y="95" text-anchor="middle" fill="#ff6b00" font-size="48" font-weight="bold" font-family="Arial, sans-serif">N</text>
  <text x="427" y="272" text-anchor="middle" fill="#00d4ff" font-size="36" font-weight="bold" font-family="Arial, sans-serif">E</text>
  <text x="256" y="435" text-anchor="middle" fill="#00d4ff" font-size="36" font-weight="bold" font-family="Arial, sans-serif">S</text>
  <text x="85" y="272" text-anchor="middle" fill="#00d4ff" font-size="36" font-weight="bold" font-family="Arial, sans-serif">W</text>
</svg>
